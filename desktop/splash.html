<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Starting Vellam…</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0; height: 100%;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: radial-gradient(120% 120% at 50% 0%, #1a1a2e 0%, #0b0b12 60%);
        color: #e7e7f2;
        overflow: hidden;
      }
      .wrap {
        height: 100%;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 18px; user-select: none;
      }
      .logo {
        font-size: 34px; font-weight: 700; letter-spacing: 0.5px;
        background: linear-gradient(90deg, #7c5cff, #4ea1ff);
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      .sub { font-size: 13px; color: #9a9ab2; }
      .bar {
        width: 220px; height: 4px; border-radius: 4px;
        background: rgba(255,255,255,0.08); overflow: hidden;
      }
      .bar > span {
        display: block; height: 100%; width: 40%;
        background: linear-gradient(90deg, #7c5cff, #4ea1ff);
        border-radius: 4px;
        animation: slide 1.2s ease-in-out infinite;
      }
      @keyframes slide {
        0%   { transform: translateX(-120%); }
        100% { transform: translateX(320%); }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo">Vellam</div>
      <div class="sub">Starting local agent &amp; services…</div>
      <div class="bar"><span></span></div>
    </div>
  </body>
</html>
